name: Update Guidelines

on:
  issues: # https://docs.github.com/en/actions/reference/workflows-and-actions/events-that-trigger-workflows#issues
    types: [opened, reopened, edited, deleted, closed]
  workflow_dispatch:

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: 'main'

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up env.
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Update guidelines data files
      run: |
        src/data_fetcher update
        ls -rtl docs/
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Commit new guidelines file
      uses: devops-infra/action-commit-push@v1.2.0
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        commit_message: "Update guidelines file"
